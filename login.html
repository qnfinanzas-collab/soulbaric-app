<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulBaric — Acceso</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:   #1a1a1a;
      --dark2:  #2d2d2d;
      --dark3:  #3a3530;
      --gold:   #C89968;
      --gold-d: #8B6F47;
      --gold-l: #D4A574;
      --bg:     #f5f3f0;
      --white:  #ffffff;
      --border: rgba(200,153,104,0.2);
      --text-m: rgba(255,255,255,0.5);
      --error:  #e57373;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 60%, #2a2520 100%);
      padding: 20px;
    }

    /* Fondo decorativo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(200,153,104,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(200,153,104,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(12px);
      position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(200,153,104,0.3);
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .logo p {
      font-size: 11px;
      color: var(--text-m);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 28px;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-m);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(200,153,104,0.15);
      border-radius: 8px;
      padding: 13px 16px;
      font-size: 14px;
      color: #fff;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus {
      border-color: var(--gold);
      background: rgba(200,153,104,0.08);
    }

    /* Error */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(229,115,115,0.1);
      border: 1px solid rgba(229,115,115,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 18px;
    }
    .error-msg.visible { display: flex; }

    /* Button */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%);
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-login:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading spinner */
    .btn-login .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(26,26,26,0.3);
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner  { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
    }

    /* Mobile */
    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<div class="login-card">

  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>SoulBaric</h1>
    <p>Plataforma de gestión</p>
  </div>

  <div class="divider"></div>

  <div class="error-msg" id="errorMsg">
    <span>⚠</span>
    <span id="errorText">Usuario o contraseña incorrectos</span>
  </div>

  <form id="loginForm" autocomplete="off">

    <div class="form-group">
      <label for="username">Usuario</label>
      <input
        type="text"
        id="username"
        placeholder="Tu usuario"
        autocomplete="username"
        required
      >
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input
        type="password"
        id="password"
        placeholder="••••••••••"
        autocomplete="current-password"
        required
      >
    </div>

    <button type="submit" class="btn-login" id="btnLogin">
      <span class="btn-text">Entrar</span>
      <div class="spinner"></div>
    </button>

  </form>

  <div class="login-footer">
    SoulBaric © 2026 — Acceso restringido
  </div>

</div>

<script src="auth.js"></script>
<script>
  // Si ya tiene sesión activa → redirigir a home
  if (SB_AUTH.isAuthenticated()) {
    const params = new URLSearchParams(window.location.search);
    window.location.replace(params.get('redirect') || '/home.html');
  }

  const form    = document.getElementById('loginForm');
  const btn     = document.getElementById('btnLogin');
  const errMsg  = document.getElementById('errorMsg');
  const errText = document.getElementById('errorText');

  function showError(msg) {
    errText.textContent = msg || 'Usuario o contraseña incorrectos';
    errMsg.classList.add('visible');
  }
  function hideError() {
    errMsg.classList.remove('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showError('Completa todos los campos');
      return;
    }

    // Loading state
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const ok = await SB_AUTH.login(username, password);

      if (ok) {
        // Redirigir a la página solicitada o a home
        const params = new URLSearchParams(window.location.search);
        window.location.replace(params.get('redirect') || '/home.html');
      } else {
        showError('Usuario o contraseña incorrectos');
        btn.disabled = false;
        btn.classList.remove('loading');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch (err) {
      showError('Error de conexión. Inténtalo de nuevo.');
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });

  // Ocultar error al escribir
  ['username', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('input', hideError);
  });
</script>

</body>
</html>
